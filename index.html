<style>

  .lang-switch { display:inline-flex; border:1px solid var(--stone); }
  .lang-switch button { padding:4px 9px; border:none; background:var(--paper); cursor:pointer; font-family:var(--mono); font-size:10px; color:var(--graphite); border-right:1px solid var(--stone); }
  .lang-switch button:last-child { border-right:none; }

<body class="grain">

<div id="map"></div>

<div class="zoom-ctl">
  <button type="button" id="zoom-in" aria-label="Inzoomen">+</button>
  <button type="button" id="zoom-out" aria-label="Uitzoomen">−</button>
</div>

<div class="compare-divider" id="compare-divider"><span class="knob">↔</span></div>
<div class="compare-label then" id="cmp-then" data-i18n="compare.then">TOEN</div>
<div class="compare-label now" id="cmp-now" data-i18n="compare.now">NU</div>

<div class="tile-spinner" id="tile-spinner" data-i18n="loading">Laden…</div>

<aside class="panel grain" id="panel">
  <div class="sheet-handle" id="sheet-handle" role="button" aria-label="Paneel wisselen">
    <span class="grip"></span>
    <span class="hint"><span class="accent">▲</span>&nbsp; <span data-i18n="sheet.hint">Tik om te openen</span></span>
  </div>
  <div class="panel-scroll">
    <header class="panel-head">
      <div class="head-en" data-i18n="app.tagline">Netherlands · Old-Map Stroll</div>
      <div class="head-zh" data-i18n="app.title">荷蘭古地圖散策</div>
      <div class="head-meta" id="head-meta">N — · E —</div>
    </header>

    <div class="section-label">
      <span class="num">01</span>
      <span class="txt" data-i18n="sec.place">城市</span>
      <span class="en" data-i18n="sec.place.en">plaats</span>
    </div>
    <div class="city-current" id="city-current" role="button" aria-expanded="false">
      <div>
        <div class="city-zh" id="current-zh">—</div>
        <div class="city-en" id="current-en">—</div>
      </div>
      <span class="city-caret">▼</span>
    </div>
    <div class="city-list" id="city-list"></div>

    <div class="section-label">
      <span class="num">02</span>
      <span class="txt" data-i18n="sec.time">時光</span>
      <span class="en" data-i18n="sec.time.en">tijdreis</span>
    </div>
    <div class="year-display">
      <div class="year-big" id="year-big">1900</div>
      <div class="year-era">
        <span id="era-name">Bonnebladen</span>
        <span class="sub" id="era-sub" data-i18n="era.bonne.sub">1:25.000 chromotopografie</span>
      </div>
    </div>
    <input type="range" class="year" id="year-slider" min="1815" max="2021" value="1900" step="1" />
    <div class="year-ticks" id="year-ticks"></div>

    <div class="era-chips" id="era-chips"></div>

    <div class="opa-row">
      <span class="lbl" data-i18n="opacity">透明度</span>
      <input type="range" class="opa" id="opa-slider" min="0" max="100" value="85" step="1" />
      <span class="val" id="opa-val">85%</span>
    </div>

    <button type="button" class="btn" id="btn-compare">
      <span class="dot"></span>
      <span data-i18n="compare.btn">今昔對照</span>
      <span class="en">swipe</span>
    </button>

    <div class="section-label">
      <span class="num">03</span>
      <span class="txt" data-i18n="sec.locate">定位</span>
      <span class="en" data-i18n="sec.locate.en">locatie</span>
    </div>
    <button type="button" class="btn" id="btn-locate">
      <span class="dot"></span>
      <span data-i18n="locate.btn">找我的位置</span>
      <span class="en">GPS</span>
    </button>
    <div class="loc-status" id="loc-status">
      <div class="label" data-i18n="loc.fix">CURRENT FIX</div>
      <div id="loc-coords">—</div>
      <div id="loc-accuracy">—</div>
    </div>

    <div class="panel-foot">
      <span data-i18n="foot.maps">歷史圖資</span> ·
      <a href="https://www.topotijdreis.nl" target="_blank" rel="noopener">Topotijdreis</a> /
      <a href="https://www.kadaster.nl" target="_blank" rel="noopener">Kadaster</a><br>
      <span data-i18n="foot.made">設計・製作</span> ·
      <a href="https://github.com/yunching0513" target="_blank" rel="noopener">吳昃慶 Yunching Wu</a>

      <div class="foot-toggles">
        <span class="lang-switch" id="lang-switch">
          <button type="button" data-lang="nl">NL</button>
          <button type="button" data-lang="en">EN</button>
          <button type="button" data-lang="zh">中</button>
        </span>
        <button type="button" class="pill-toggle" id="theme-toggle" data-i18n="theme.light">紙色</button>
      </div>
    </div>
  </div>
</aside>

    { id: 'groningen',  region: 'noord',    zh: '格羅寧根',   en: 'Groningen',       center: [53.2194, 6.5665] },
    { id: 'leeuwarden', region: 'noord',    zh: '呂伐登',     en: 'Leeuwarden',      center: [53.2012, 5.7999] },
    { id: 'zwolle',     region: 'noord',    zh: '茲沃勒',     en: 'Zwolle',          center: [52.5168, 6.0830] },
    { id: 'deventer',   region: 'noord',    zh: '代芬特爾',   en: 'Deventer',        center: [52.2552, 6.1639] },
    { id: 'arnhem',     region: 'noord',    zh: '阿納姆',     en: 'Arnhem',          center: [51.9851, 5.8987] },
    { id: 'nijmegen',   region: 'noord',    zh: '奈梅亨',     en: 'Nijmegen',        center: [51.8126, 5.8372] },
    { id: 'denbosch',   region: 'zuid',     zh: '斯海爾托亨博斯', en: "'s-Hertogenbosch", center: [51.6978, 5.3037] },
    { id: 'eindhoven',  region: 'zuid',     zh: '埃因霍溫',   en: 'Eindhoven',       center: [51.4416, 5.4697] },
    { id: 'maastricht', region: 'zuid',     zh: '馬斯特里赫特', en: 'Maastricht',     center: [50.8514, 5.6910] },
    { id: 'middelburg', region: 'zuid',     zh: '米德爾堡',   en: 'Middelburg',      center: [51.4988, 3.6111] },
  ];

  const REGIONS = {
    randstad: { zh: '蘭斯台德', en: 'Randstad' },
    noord:    { zh: '北・東部', en: 'Noord & Oost' },
    zuid:     { zh: '南部',     en: 'Zuid' },
  };

  const ERAS = [
    { from: 1815, to: 1855, key: 'tmk',   name: 'TMK' },
    { from: 1856, to: 1932, key: 'bonne', name: 'Bonnebladen' },
    { from: 1933, to: 1989, key: 'top25', name: 'Topografische kaart' },
    { from: 1990, to: 2100, key: 'actueel', name: 'Actueel' },
  ];
  function eraFor(year) { return ERAS.find(e => year >= e.from && year <= e.to) || ERAS[ERAS.length - 1]; }

  const ERA_YEARS = [1815, 1850, 1875, 1900, 1925, 1950, 1975, 2000, 2021];
  const TICK_YEARS = [1815, 1900, 1950, 2000, 2021];

  // Bron: Kadaster / Esri Nederland via ArcGIS (RD-grid, EPSG:28992).
  // Basiskaart en historische kaarten komen uit dezelfde tilecache
  // (default028mm, 12 niveaus 0..11) zodat ze exact op elkaar passen.
  const RD_DEF = '+proj=sterea +lat_0=52.15616055555555 +lon_0=5.38763888888889 +k=0.9999079 +x_0=155000 +y_0=463000 +ellps=bessel +towgs84=565.4171,50.3319,465.5524,-0.398957,0.343988,-1.8774,4.0725 +units=m +no_defs';
  const RD = new L.Proj.CRS('EPSG:28992', RD_DEF, {
    origin: [-30515500, 31112400],
    resolutions: [3251.206502413005, 1625.6032512065026, 812.8016256032513, 406.40081280162565, 203.20040640081282, 101.60020320040641, 50.800101600203206, 25.400050800101603, 12.700025400050801, 6.350012700025401, 3.1750063500127004, 1.5875031750063502],
  });

  const ARC = 'https://tiles.arcgis.com/tiles/nSZVuSZjHpEZZbRo/arcgis/rest/services/';
  const BASE_URL = ARC + 'Historische_tijdreis_2021/MapServer/tile/{z}/{y}/{x}';
  const BASE_ATTR = 'Basis &copy; <a href="https://www.topotijdreis.nl" target="_blank" rel="noopener">Topotijdreis 2021</a> / Kadaster';
  const HIST_ATTR = 'Historie &copy; <a href="https://www.topotijdreis.nl" target="_blank" rel="noopener">Topotijdreis</a> / Kadaster';
  function histUrl(id) { return ARC + 'Historische_tijdreis_' + id + '/MapServer/tile/{z}/{y}/{x}'; }

  // Beschikbare kaartjaren = ArcGIS-services (sommige zijn reeksen, bv. 1823_1829).
  const AVAIL = ['1815','1820','1821','1823_1829','1830_1849','1850','1857','1858','1861','1862','1865','1866','1868','1870','1871','1872','1880','1883','1886','1888','1889','1893','1899','1900','1901','1902','1904','1908','1909','1910','1912','1915','1918','1919','1920','1922','1925','1929','1931','1935','1937','1940','1942','1943','1947','1948','1949','1950','1951','1952','1953','1955','1962','1963','1965','1970','1971','1973','1975','1976','1978','1980','1984','1988','1990','1994','1995','1996','1997','1999','2000','2001','2002','2003','2004','2005','2006','2007','2008','2009','2010','2011','2012','2013','2014','2015','2016','2017','2018','2019','2020','2021'];
  const AVAIL_Y = AVAIL.map(s => parseInt(s, 10));
  function nearestService(year) {
    let best = 0, bd = Infinity;
    for (let i = 0; i < AVAIL_Y.length; i++) {
      const d = Math.abs(AVAIL_Y[i] - year);
      if (d < bd) { bd = d; best = i; }
    }
    return { id: AVAIL[best], year: AVAIL_Y[best] };
  }

  const I18N = {
    nl: {
      'app.title': 'Oude-Kaart Wandeling', 'app.tagline': 'Nederland · door de tijd',
      'sec.place': 'Plaats', 'sec.place.en': 'plaats',
      'sec.time': 'Tijdreis', 'sec.time.en': 'tijdreis',
      'sec.locate': 'Locatie', 'sec.locate.en': 'locatie',
      'opacity': 'Dekking', 'compare.btn': 'Toen & nu', 'compare.then': 'TOEN', 'compare.now': 'NU',
      'locate.btn': 'Vind mijn locatie', 'loc.fix': 'HUIDIGE POSITIE',
      'foot.maps': 'Historie', 'foot.made': 'Ontwerp & bouw',
      'theme.light': 'Papier', 'theme.dark': 'Inkt', 'loading': 'Laden…', 'sheet.hint': 'Tik om te openen',
      'era.tmk.sub': 'Topogr. Militaire Kaart 1:50.000', 'era.bonne.sub': '1:25.000 chromotopografie',
      'era.top25.sub': 'Topografische kaart 1:25.000', 'era.actueel.sub': 'Actuele topografie',
    },
    en: {
      'app.title': 'Old-Map Stroll', 'app.tagline': 'Netherlands · through time',
      'sec.place': 'Place', 'sec.place.en': 'place',
      'sec.time': 'Time travel', 'sec.time.en': 'time travel',
      'sec.locate': 'Locate', 'sec.locate.en': 'locate',
      'opacity': 'Opacity', 'compare.btn': 'Then & now', 'compare.then': 'THEN', 'compare.now': 'NOW',
      'locate.btn': 'Find my location', 'loc.fix': 'CURRENT FIX',
      'foot.maps': 'History', 'foot.made': 'Design & build',
      'theme.light': 'Paper', 'theme.dark': 'Ink', 'loading': 'Loading…', 'sheet.hint': 'Tap to open',
      'era.tmk.sub': 'Topo-Military Map 1:50,000', 'era.bonne.sub': '1:25,000 chromotopography',
      'era.top25.sub': 'Topographic map 1:25,000', 'era.actueel.sub': 'Current topography',
    },
    zh: {
      'app.title': '荷蘭古地圖散策', 'app.tagline': '荷蘭 · 穿越時光',
      'sec.place': '城市', 'sec.place.en': '城市',
      'sec.time': '時光', 'sec.time.en': '時光旅行',
      'sec.locate': '定位', 'sec.locate.en': '定位',
      'opacity': '透明度', 'compare.btn': '今昔對照', 'compare.then': '昔', 'compare.now': '今',
      'locate.btn': '找我的位置', 'loc.fix': '目前定位',
      'foot.maps': '歷史圖資', 'foot.made': '設計・製作',
      'theme.light': '紙色', 'theme.dark': '墨色', 'loading': '載入中…', 'sheet.hint': '點此展開',
      'era.tmk.sub': '地形軍事圖 1:50,000', 'era.bonne.sub': '1:25,000 套色地形圖',
      'era.top25.sub': '地形圖 1:25,000', 'era.actueel.sub': '當代地形圖',
    },
  };

  let lang = (function () {
    try { return localStorage.getItem('nlOldMaps.lang') || pick(); } catch (e) { return pick(); }
    function pick() {
      const n = (navigator.language || 'nl').toLowerCase();
      if (n.startsWith('zh')) return 'zh';
      if (n.startsWith('nl')) return 'nl';
      return 'en';
    }
  })();

  function t(key) { return (I18N[lang] && I18N[lang][key]) || (I18N.nl[key]) || key; }

  function applyI18n() {
    document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-Hant' : lang);
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (I18N[lang] && I18N[lang][k] != null) el.textContent = I18N[lang][k];
    });
    document.querySelectorAll('#lang-switch button').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === lang));
    updateEraLabel(state.year);
    renderCityList();
    updateCurrentCity();
    document.getElementById('theme-toggle').textContent =
      document.documentElement.classList.contains('theme-dark') ? t('theme.dark') : t('theme.light');
  }

  const params = new URLSearchParams(location.search);
  let storedCity = null, storedYear = null;
  try { storedCity = localStorage.getItem('nlOldMaps.city'); storedYear = localStorage.getItem('nlOldMaps.year'); } catch (e) {}

  const startCity =
    (params.get('city') && CITIES.find(c => c.id === params.get('city'))) ? params.get('city') :
    (storedCity && CITIES.find(c => c.id === storedCity)) ? storedCity : 'amsterdam';
  const startYear = clampYear(parseInt(params.get('year') || storedYear || '1900', 10));

  const state = {
    city: CITIES.find(c => c.id === startCity),
    year: startYear,
    opacity: 0.85,
    compare: false,
  };

  function clampYear(y) { if (isNaN(y)) return 1900; return Math.max(1815, Math.min(2021, y)); }

  const CITY_ZOOM = 11;
  const map = L.map('map', { zoomControl: false, attributionControl: true, crs: RD, maxZoom: 11, minZoom: 5 })
    .setView(state.city.center, CITY_ZOOM);

  map.createPane('basePane');   map.getPane('basePane').style.zIndex = 200;
  map.createPane('histPane');   map.getPane('histPane').style.zIndex = 350;
  map.getPane('histPane').id = 'hist-pane';

  let histLayer = null;
  const baseLayer = L.tileLayer(BASE_URL, {
    pane: 'basePane', maxNativeZoom: 11, attribution: BASE_ATTR,
  }).addTo(map);

  const spinner = document.getElementById('tile-spinner');
  function setHistYear(year) {
    const snap = nearestService(clampYear(year));
    state.year = snap.year;
    if (histLayer) map.removeLayer(histLayer);
    histLayer = L.tileLayer(histUrl(snap.id), {
      pane: 'histPane', opacity: state.opacity,
      maxNativeZoom: 11, attribution: HIST_ATTR,
    }).addTo(map);
    histLayer.on('loading', () => { spinner.classList.add('show'); });
    histLayer.on('load', () => { spinner.classList.remove('show'); });
    document.getElementById('year-slider').value = state.year;
    document.getElementById('year-big').textContent = state.year;
    updateEraLabel(state.year);
    updateEraChips();
    applyCompareClip();
    try { localStorage.setItem('nlOldMaps.year', state.year); } catch (e) {}
    syncURL();
  }

  function updateEraLabel(year) {
    const era = eraFor(year);
    document.getElementById('era-name').textContent = era.name;
    document.getElementById('era-sub').textContent = t('era.' + era.key + '.sub');
  }

  function renderCityList() {
    const wrap = document.getElementById('city-list');
    wrap.innerHTML = '';
    Object.keys(REGIONS).forEach(rid => {
      const lab = document.createElement('div');
      lab.className = 'region-label';
      lab.textContent = REGIONS[rid][lang === 'zh' ? 'zh' : 'en'];
      wrap.appendChild(lab);
      CITIES.filter(c => c.region === rid).forEach(c => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'city-chip' + (c.id === state.city.id ? ' active' : '');
        chip.innerHTML = (lang === 'zh' ? c.zh : c.en) +
          (lang === 'zh' ? ' <span class="en">' + c.en + '</span>' : '');
        chip.addEventListener('click', () => { selectCity(c.id); });
        wrap.appendChild(chip);
      });
    });
  }

  function updateCurrentCity() {
    document.getElementById('current-zh').textContent = lang === 'zh' ? state.city.zh : state.city.en;
    document.getElementById('current-en').textContent = lang === 'zh' ? state.city.en : ('N ' + state.city.center[0].toFixed(3) + ' · E ' + state.city.center[1].toFixed(3));
  }

  function selectCity(id) {
    const c = CITIES.find(x => x.id === id);
    if (!c) return;
    state.city = c;
    map.setView(c.center, CITY_ZOOM);
    updateCurrentCity();
    renderCityList();
    try { localStorage.setItem('nlOldMaps.city', id); } catch (e) {}
    syncURL();
    if (window.innerWidth <= 640) closeSheet();
  }

  function renderTicks() {
    const wrap = document.getElementById('year-ticks');
    wrap.innerHTML = '';
    TICK_YEARS.forEach(y => {
      const s = document.createElement('span');
      s.textContent = y;
      s.addEventListener('click', () => setHistYear(y));
      wrap.appendChild(s);
    });
  }
  function renderEraChips() {
    const wrap = document.getElementById('era-chips');
    wrap.innerHTML = '';
    ERA_YEARS.forEach(y => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'era-chip'; b.dataset.year = y; b.textContent = y;
      b.addEventListener('click', () => setHistYear(y));
      wrap.appendChild(b);
    });
  }
  function updateEraChips() {
    document.querySelectorAll('.era-chip').forEach(b =>
      b.classList.toggle('active', nearestService(parseInt(b.dataset.year, 10)).year === state.year));
  }

  const divider = document.getElementById('compare-divider');
  let comparePct = 50;
  function applyCompareClip() {
    if (!histLayer) return;
    const c = histLayer.getContainer();
    if (!c) return;
    if (!state.compare) { c.style.clip = ''; return; }
    const size = map.getSize();
    const nw = map.containerPointToLayerPoint([0, 0]);
    const se = map.containerPointToLayerPoint([size.x, size.y]);
    const clipX = nw.x + size.x * (comparePct / 100);
    c.style.clip = 'rect(' + nw.y + 'px,' + clipX + 'px,' + se.y + 'px,' + nw.x + 'px)';
  }
  function toggleCompare() {
    state.compare = !state.compare;
    document.getElementById('btn-compare').classList.toggle('active', state.compare);
    document.body.classList.toggle('compare-active', state.compare);
    divider.classList.toggle('show', state.compare);
    if (state.compare) { comparePct = 50; divider.style.left = '50%'; }
    applyCompareClip();
  }
  function dragDivider(clientX) {
    const pct = Math.max(4, Math.min(96, (clientX / window.innerWidth) * 100));
    comparePct = pct;
    divider.style.left = pct + '%';
    applyCompareClip();
  }
  (function bindDivider() {
    let dragging = false;
    const start = e => { dragging = true; e.preventDefault(); };
    const move = e => { if (!dragging) return; const x = e.touches ? e.touches[0].clientX : e.clientX; dragDivider(x); };
    const end = () => { dragging = false; };
    divider.addEventListener('mousedown', start);
    divider.addEventListener('touchstart', start, { passive: false });
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, { passive: false });
    window.addEventListener('mouseup', end);
    window.addEventListener('touchend', end);
  })();
  map.on('move zoom moveend zoomend resize', applyCompareClip);

  let meMarker = null, meCircle = null, watchId = null;
  function toggleLocate() {
    const btn = document.getElementById('btn-locate');
    if (watchId != null) {
      navigator.geolocation.clearWatch(watchId); watchId = null;
      btn.classList.remove('active');
      document.getElementById('loc-status').classList.remove('show');
      if (meMarker) { map.removeLayer(meMarker); meMarker = null; }
      if (meCircle) { map.removeLayer(meCircle); meCircle = null; }
      return;
    }
    if (!navigator.geolocation) { alert('Geolocatie niet beschikbaar'); return; }
    btn.classList.add('active');
    document.getElementById('loc-status').classList.add('show');
    let first = true;
    watchId = navigator.geolocation.watchPosition(pos => {
      const { latitude, longitude, accuracy } = pos.coords;
      const ll = [latitude, longitude];
      if (!meMarker) {
        meMarker = L.marker(ll, { icon: L.divIcon({ className: '', html: '<div class="me-dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }) }).addTo(map);
        meCircle = L.circle(ll, { radius: accuracy, color: '#C15F3C', weight: 1, fillColor: '#C15F3C', fillOpacity: 0.08 }).addTo(map);
      } else {
        meMarker.setLatLng(ll); meCircle.setLatLng(ll).setRadius(accuracy);
      }
      if (first) { map.setView(ll, Math.max(map.getZoom(), 11)); first = false; }
      document.getElementById('loc-coords').textContent = 'N ' + latitude.toFixed(5) + ' · E ' + longitude.toFixed(5);
      document.getElementById('loc-accuracy').textContent = '± ' + Math.round(accuracy) + ' m';
    }, err => {
      btn.classList.remove('active');
      document.getElementById('loc-coords').textContent = '⚠ ' + (err.message || 'fout');
    }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 });
  }

  function updateMeta() {
    const c = map.getCenter();
    document.getElementById('head-meta').textContent =
      'N ' + c.lat.toFixed(4) + ' · E ' + c.lng.toFixed(4) + ' · Z' + map.getZoom();
  }
  map.on('move zoom', updateMeta);

  function syncURL() {
    const u = new URL(location.href);
    u.searchParams.set('city', state.city.id);
    u.searchParams.set('year', state.year);
    history.replaceState(null, '', u);
  }

  const panel = document.getElementById('panel');
  function openSheet() { panel.classList.add('open'); }
  function closeSheet() { panel.classList.remove('open'); }
  document.getElementById('sheet-handle').addEventListener('click', () => panel.classList.toggle('open'));

  document.getElementById('zoom-in').addEventListener('click', () => map.zoomIn());
  document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());

  document.getElementById('city-current').addEventListener('click', function () {
    const open = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', String(!open));
    document.getElementById('city-list').classList.toggle('open', !open);
  });

  const yearSlider = document.getElementById('year-slider');
  let scrubTimer = null;
  yearSlider.addEventListener('input', e => {
    const y = clampYear(parseInt(e.target.value, 10));
    document.getElementById('year-big').textContent = y;
    updateEraLabel(y);
    clearTimeout(scrubTimer);
    scrubTimer = setTimeout(() => { setHistYear(y); }, 160);
  });
  yearSlider.addEventListener('change', e => { clearTimeout(scrubTimer); setHistYear(parseInt(e.target.value, 10)); });

  const opaSlider = document.getElementById('opa-slider');
  opaSlider.addEventListener('input', e => {
    state.opacity = e.target.value / 100;
    document.getElementById('opa-val').textContent = e.target.value + '%';
    if (histLayer) histLayer.setOpacity(state.opacity);
  });

  document.getElementById('btn-compare').addEventListener('click', toggleCompare);
  document.getElementById('btn-locate').addEventListener('click', toggleLocate);

  document.querySelectorAll('#lang-switch button').forEach(b =>
    b.addEventListener('click', () => {
      lang = b.dataset.lang;
      try { localStorage.setItem('nlOldMaps.lang', lang); } catch (e) {}
      applyI18n();
    }));

  document.getElementById('theme-toggle').addEventListener('click', function () {
    const dark = document.documentElement.classList.toggle('theme-dark');
    try { localStorage.setItem('nlOldMaps.theme', dark ? 'dark' : 'light'); } catch (e) {}
    const m = document.querySelector('meta[name="theme-color"]');
    if (m) m.setAttribute('content', dark ? '#1A1A1A' : '#F1EFE9');
    this.textContent = dark ? t('theme.dark') : t('theme.light');
  });

  renderTicks();
  renderEraChips();
  renderCityList();
  updateCurrentCity();
  opaSlider.value = Math.round(state.opacity * 100);
  document.getElementById('opa-val').textContent = Math.round(state.opacity * 100) + '%';
  setHistYear(state.year);
  applyI18n();
  updateMeta();

  // Service worker tijdelijk uitgeschakeld: oude SW + caches opruimen.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister())).catch(() => {});
    if (window.caches) caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(() => {});
  }
})();
</script>
</body>
</html>
