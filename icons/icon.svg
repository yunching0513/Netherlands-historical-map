<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Oude-Kaart Wandeling">
  <defs>
    <clipPath id="r"><rect x="0" y="0" width="512" height="512" rx="96" ry="96"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="512" height="512" fill="#F1EFE9"/>
    <!-- gevouwen kaart: drie panelen -->
    <g>
      <polygon points="96,168 218,140 218,372 96,400" fill="#EAE8E2" stroke="#807C73" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="218,140 340,168 340,400 218,372" fill="#D6D3CB" stroke="#807C73" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="340,168 462,140 462,372 340,400" fill="#EAE8E2" stroke="#807C73" stroke-width="6" stroke-linejoin="round"/>
      <!-- vouwlijnen -->
      <line x1="218" y1="140" x2="218" y2="372" stroke="#807C73" stroke-width="4"/>
      <line x1="340" y1="168" x2="340" y2="400" stroke="#807C73" stroke-width="4"/>
    </g>
    <!-- wandelroute -->
    <path d="M150,350 C 200,300 200,250 255,245 C 310,240 320,300 400,210"
          fill="none" stroke="#C15F3C" stroke-width="12" stroke-linecap="round" stroke-dasharray="2 26"/>
    <!-- locatie-speld -->
    <g>
      <path d="M400,150 c -26,0 -47,21 -47,47 c 0,33 47,72 47,72 c 0,0 47,-39 47,-72 c 0,-26 -21,-47 -47,-47 z" fill="#C15F3C"/>
      <circle cx="400" cy="197" r="17" fill="#F1EFE9"/>
    </g>
  </g>
</svg>
