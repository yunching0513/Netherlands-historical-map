name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/dutch-historical-maps-foj51a
  workflow_dispatch:

# Sta toe dat de workflow GitHub Pages inschakelt en publiceert.
permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; lopende runs niet afbreken.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (schakelt Pages zo nodig in)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
